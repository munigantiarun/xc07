services:
  postgres:
    image: postgres:16-alpine
    container_name: continuum-demo-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum
      POSTGRES_DB: continuum_demo
    volumes:
      - continuum_pg_data:/var/lib/postgresql/data

volumes:
  continuum_pg_data:
